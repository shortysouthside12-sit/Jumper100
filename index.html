<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .metric {
            font-size: 2.5em;
            font-weight: bold;
            color: #764ba2;
            margin: 15px 0;
        }
        .label {
            color: #666;
            font-size: 0.9em;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #764ba2;
        }
        .list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .list-item {
            background: #f5f5f5;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #ff6b6b;
            padding: 5px 10px;
            font-size: 0.8em;
        }
        .delete-btn:hover {
            background: #ff5252;
        }
        .chart {
            margin-top: 20px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            height: 150px;
        }
        .bar {
            flex: 1;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px 6px 0 0;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Business Dashboard</h1>
            <p>Quick Business Management Tool</p>
        </header>

        <div class="dashboard">
            <!-- Revenue Card -->
            <div class="card">
                <h2>💰 Revenue</h2>
                <div class="metric" id="revenue">$0</div>
                <div class="label">Total Monthly Revenue</div>
                <div class="input-group">
                    <input type="number" id="revenueInput" placeholder="Enter amount">
                    <button onclick="addRevenue()">Add</button>
                </div>
            </div>

            <!-- Expenses Card -->
            <div class="card">
                <h2>💸 Expenses</h2>
                <div class="metric" id="expenses">$0</div>
                <div class="label">Total Monthly Expenses</div>
                <div class="input-group">
                    <input type="number" id="expenseInput" placeholder="Enter amount">
                    <button onclick="addExpense()">Add</button>
                </div>
            </div>

            <!-- Profit Card -->
            <div class="card">
                <h2>📈 Profit</h2>
                <div class="metric" id="profit" style="color: #51cf66;">$0</div>
                <div class="label">Revenue - Expenses</div>
                <button onclick="resetData()" style="width: 100%; margin-top: 20px; background: #ff6b6b;">Reset All</button>
            </div>

            <!-- Tasks Card -->
            <div class="card">
                <h2>✅ Tasks</h2>
                <div class="label">Completed: <span id="taskCount">0</span> / <span id="totalTasks">0</span></div>
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Add new task">
                    <button onclick="addTask()">Add</button>
                </div>
                <div class="list" id="taskList"></div>
            </div>

            <!-- Clients Card -->
            <div class="card">
                <h2>👥 Clients</h2>
                <div class="metric" id="clientCount">0</div>
                <div class="label">Total Clients</div>
                <div class="input-group">
                    <input type="text" id="clientInput" placeholder="Client name">
                    <button onclick="addClient()">Add</button>
                </div>
                <div class="list" id="clientList"></div>
            </div>

            <!-- Performance Card -->
            <div class="card">
                <h2>📊 Performance</h2>
                <div class="chart">
                    <div class="bar" style="height: 60%"><span>Q1</span></div>
                    <div class="bar" style="height: 80%"><span>Q2</span></div>
                    <div class="bar" style="height: 70%"><span>Q3</span></div>
                    <div class="bar" style="height: 90%"><span>Q4</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = {
            revenue: 0,
            expenses: 0,
            tasks: [],
            clients: []
        };

        function addRevenue() {
            const input = document.getElementById('revenueInput');
            const amount = parseFloat(input.value);
            if (amount > 0) {
                data.revenue += amount;
                updateDisplay();
                input.value = '';
            }
        }

        function addExpense() {
            const input = document.getElementById('expenseInput');
            const amount = parseFloat(input.value);
            if (amount > 0) {
                data.expenses += amount;
                updateDisplay();
                input.value = '';
            }
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim()) {
                data.tasks.push({ text: input.value, done: false });
                updateDisplay();
                input.value = '';
            }
        }

        function completeTask(index) {
            data.tasks[index].done = !data.tasks[index].done;
            updateDisplay();
        }

        function deleteTask(index) {
            data.tasks.splice(index, 1);
            updateDisplay();
        }

        function addClient() {
            const input = document.getElementById('clientInput');
            if (input.value.trim()) {
                data.clients.push(input.value);
                updateDisplay();
                input.value = '';
            }
        }

        function deleteClient(index) {
            data.clients.splice(index, 1);
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('revenue').textContent = '$' + data.revenue.toFixed(2);
            document.getElementById('expenses').textContent = '$' + data.expenses.toFixed(2);
            const profit = data.revenue - data.expenses;
            document.getElementById('profit').textContent = '$' + profit.toFixed(2);
            document.getElementById('profit').style.color = profit >= 0 ? '#51cf66' : '#ff6b6b';

            const taskList = document.getElementById('taskList');
            taskList.innerHTML = data.tasks.map((task, i) => `
                <div class="list-item" style="text-decoration: ${task.done ? 'line-through' : 'none'}; opacity: ${task.done ? 0.6 : 1};">
                    <span onclick="completeTask(${i})" style="cursor: pointer; flex: 1;">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${i})">Delete</button>
                </div>
            `).join('');

            const completed = data.tasks.filter(t => t.done).length;
            document.getElementById('taskCount').textContent = completed;
            document.getElementById('totalTasks').textContent = data.tasks.length;

            document.getElementById('clientCount').textContent = data.clients.length;
            const clientList = document.getElementById('clientList');
            clientList.innerHTML = data.clients.map((client, i) => `
                <div class="list-item">
                    <span>${client}</span>
                    <button class="delete-btn" onclick="deleteClient(${i})">Delete</button>
                </div>
            `).join('');
        }

        function resetData() {
            data = { revenue: 0, expenses: 0, tasks: [], clients: [] };
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
